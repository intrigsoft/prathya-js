module:
  id: AUTH
  name: Authentication Module
  description: Handles user authentication
  owner: team@example.com
  created: 2026-03-06
  version: 1.2.0

specs:
  - id: AUTH-001
    version: 1.1.0
    status: approved
    title: User login with email and password
    description: >
      The system must authenticate a user given a valid email and password combination.
    acceptance_criteria:
      - Valid credentials return a signed JWT access token and refresh token
      - Access token expiry is set to 15 minutes
    cases:
      - id: AUTH-001-TC-001
        description: Email valid but password incorrect — must return 401
      - id: AUTH-001-TC-002
        description: Unknown email — response must be identical to wrong password
      - id: AUTH-001-TC-003
        description: Email in mixed case — must be normalized
    changelog:
      - version: 1.0.0
        date: 2026-01-10
        note: Initial definition
      - version: 1.1.0
        date: 2026-02-18
        note: Added enumeration prevention

  - id: AUTH-002
    version: 1.0.0
    status: approved
    title: JWT refresh
    description: >
      The system must issue a new access token when presented with a valid refresh token.
    acceptance_criteria:
      - Valid refresh token returns a new access token
      - Original refresh token is rotated
    cases:
      - id: AUTH-002-TC-001
        description: Refresh token used twice — second use must fail
    changelog:
      - version: 1.0.0
        date: 2026-01-10
        note: Initial definition

  - id: AUTH-003
    version: 1.0.0
    status: superseded
    superseded_by: AUTH-005
    title: Single-factor password reset (superseded)
    description: >
      The system must allow password reset via email link only.
    acceptance_criteria:
      - Reset link is valid for 30 minutes
    cases: []
    changelog:
      - version: 1.0.0
        date: 2026-01-10
        note: Initial definition

  - id: AUTH-005
    version: 1.0.0
    status: approved
    supersedes: AUTH-003
    title: MFA-aware password reset
    description: >
      The system must allow password reset via email link, with optional MFA.
    acceptance_criteria:
      - Reset link is valid for 15 minutes
      - If MFA is enabled, OTP verification required before reset
    cases:
      - id: AUTH-005-TC-001
        description: Reset link used after expiry — must return 410 Gone
      - id: AUTH-005-TC-002
        description: User attempts reset while logged in — session must be invalidated
    changelog:
      - version: 1.0.0
        date: 2026-02-01
        note: Supersedes AUTH-003
