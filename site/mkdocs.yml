site_name: Prathya JS
site_description: Contract-Driven Requirement Coverage for JavaScript & TypeScript
site_url: https://intrigsoft.github.io/prathya-js
repo_url: https://github.com/intrigsoft/prathya-js
repo_name: intrigsoft/prathya-js

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  logo: assets/logo.svg
  favicon: assets/favicon.png
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Concepts: concepts.md
  - CONTRACT.yaml Reference: contract-format.md
  - Integrations:
      - Vitest: integrations/vitest.md
      - Playwright: integrations/playwright.md
      - Jest: integrations/jest.md
  - CLI: cli.md
  - MCP Server: mcp-server.md
  - Audit Rules: audit-rules.md
  - Changelog: changelog.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/intrigsoft/prathya-js
